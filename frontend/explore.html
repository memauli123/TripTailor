<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Tailor - Explore</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="logo">Trip Tailor</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="explore.html" class="active">Explore</a></li>
            <li><a href="community.html">Community</a></li>
            <li><a href="profile.html" id="profile-link" style="display:none;">Profile</a></li>
            <li><button id="theme-toggle">🌓</button></li>
            <li id="auth-nav"><a href="#" id="login-btn">Login</a></li>
        </ul>
    </nav>

    <section class="explore-header">
        <h1>Explore India</h1>
        <div class="search-filters">
            <div class="filter-group">
                <select id="type-filter">
                    <option value="all">All</option>
                    <option value="monuments">Monuments</option>
                    <option value="restaurants">Restaurants</option>
                </select>
                <select id="city-filter">
                    <option value="">All Cities</option>
                </select>
            </div>
            <div class="search-group">
                <input type="text" id="search-input" placeholder="Search by name or location...">
                <button id="search-btn" class="cta-btn">Search</button>
            </div>
        </div>
        <div class="categories">
            <h3>Popular Categories</h3>
            <div class="category-tags">
                <span class="category-tag" data-category="historical">Historical Sites</span>
                <span class="category-tag" data-category="nature">Nature & Wildlife</span>
                <span class="category-tag" data-category="religious">Religious Places</span>
                <span class="category-tag" data-category="adventure">Adventure</span>
                <span class="category-tag" data-category="shopping">Shopping</span>
            </div>
        </div>
    </section>

    <section class="explore-results">
        <div class="masonry-grid" id="results-container">
            </div>
    </section>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">×</span>
            <h2 id="modal-title">Login</h2>
            <form id="auth-form">
                <input type="text" id="username" placeholder="Username (for signup)" style="display:none;">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" id="auth-submit" class="cta-btn" style="width: 100%; margin-top: 1rem;">Login</button>
            </form>
            <p id="toggle-auth" style="margin-top: 1rem; text-align: center;">Don't have an account? <span>Sign up</span></p>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/login.js"></script>
    <script src="js/explore.js"></script>
</body>
</html>
