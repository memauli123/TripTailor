<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Tailor - Home</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="logo">Trip Tailor</div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="explore.html">Explore</a></li>
            <li><a href="community.html">Community</a></li>
            <li><a href="profile.html" id="profile-link" style="display:none;">Profile</a></li>
            <li><button id="theme-toggle">🌓</button></li>
            <li id="auth-nav"><a href="#" id="login-btn">Login</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Tailor Your Perfect Trip</h1>
            <p>Discover trending destinations, popular places, and community stories.</p>
            <a href="explore.html" class="cta-btn">Start Exploring</a>
        </div>
    </header>

    <section class="featured-section" style="padding: 2rem 5%;">
        <h2>Trending Cities</h2>
        <div class="trending-grid" id="trending-container">
            </div>
    </section>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">×</span>
            <h2 id="modal-title">Login</h2>
            <form id="auth-form">
                <input type="text" id="username" placeholder="Username (for signup)" style="display:none;">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" id="auth-submit" class="cta-btn" style="width: 100%; margin-top: 1rem;">Login</button>
            </form>
            <p id="toggle-auth" style="margin-top: 1rem; text-align: center;">Don't have an account? <span>Sign up</span></p>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
