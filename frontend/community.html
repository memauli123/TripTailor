<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Tailor - Community</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="logo">Trip Tailor</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="explore.html">Explore</a></li>
            <li><a href="community.html" class="active">Community</a></li>
            <li><a href="profile.html" id="profile-link" style="display:none;">Profile</a></li>
            <li><button id="theme-toggle">🌓</button></li>
            <li id="auth-nav"><a href="#" id="login-btn">Login</a></li>
        </ul>
    </nav>

    <section class="community-layout">
        <div class="create-post" id="post-creation-area">
            <h2>Share Your Journey</h2>
            <form id="blog-form">
                <input type="text" id="blog-title" placeholder="Blog Title" required>
                <input type="text" id="blog-location" placeholder="Location" required>
                <input type="text" id="blog-image" placeholder="Image URL (Optional)">
                <textarea id="blog-content" placeholder="Write your experience..." rows="5" required></textarea>
                <button type="submit" class="cta-btn">Post Blog</button>
            </form>
            <p id="login-prompt" style="display:none; color: var(--primary-color); margin-top: 1rem;">Please login to post a blog.</p>
        </div>

        <div class="blog-feed" id="blog-feed">
            </div>
    </section>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">×</span>
            <h2 id="modal-title">Login</h2>
            <form id="auth-form">
                <input type="text" id="username" placeholder="Username (for signup)" style="display:none;">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" id="auth-submit" class="cta-btn" style="width: 100%; margin-top: 1rem;">Login</button>
            </form>
            <p id="toggle-auth" style="margin-top: 1rem; text-align: center;">Don't have an account? <span>Sign up</span></p>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/login.js"></script>
    <script src="js/community.js"></script>
</body>
</html>
